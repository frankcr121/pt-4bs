<div class="login-container">
  <div class="login-glass-card">
      <div class="login-header">
          <div class="icon-box">
              <i class="pi pi-lock text-4xl"></i>
          </div>
          <h1>Bienvenido</h1>
          <p>Ingresa al panel de la empresa</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
          <div class="input-group">
              <label>Usuario</label>
              <span class="p-input-icon-left w-full">
                  <i class="pi pi-user"></i>
                  <input pInputText formControlName="username" placeholder="mor_2314" class="w-full" />
              </span>
          </div>

          <div class="input-group">
              <label>Contraseña</label>
              <span class="p-input-icon-left w-full">
                  <i class="pi pi-key"></i>
                  <input type="password" pInputText formControlName="password" placeholder="********" class="w-full" />
              </span>
          </div>

          <button pButton type="submit" [disabled]="loginForm.invalid" 
                  label="Iniciar Sesión" class="p-button-raised w-full mt-2">
          </button>

          <div *ngIf="errorMessage" class="error-msg">
              <i class="pi pi-exclamation-circle"></i>
              <span>{{ errorMessage }}</span>
          </div>
      </form>
  </div>
</div>
